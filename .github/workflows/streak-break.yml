# Daily streak-break courtesy email cron — fires once per day at
# 14:00 UTC and pings /api/cron/streak-break on Mull. The endpoint
# detects users whose streak (≥ 3 days) just broke and sends a
# gentle one-time "we missed you" email.
#
# Why 14:00 UTC: well after the morning windows in EU/UK and the
# late-night windows on the US East coast — anyone who was going to
# answer today's dilemma has had a chance to do so. Reduces the
# "sent at 6am, they would've answered at 9" false positive.
#
# Setup: same as other crons — CRON_SECRET as a repo secret.
# The endpoint is idempotent per (user, miss-date) thanks to the
# streak_break_emails dedupe table.

name: Daily streak-break

on:
  schedule:
    - cron: '0 14 * * *'    # daily at 14:00 UTC
  workflow_dispatch: {}      # manual trigger for testing

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Mull streak-break cron
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::CRON_SECRET secret is missing. Add it under Repo Settings → Secrets and variables → Actions."
            exit 1
          fi
          response=$(curl -sS -w '\n%{http_code}' \
            -H "Authorization: Bearer $CRON_SECRET" \
            https://mull.world/api/cron/streak-break)
          body=$(echo "$response" | sed '$d')
          status=$(echo "$response" | tail -n1)
          echo "HTTP $status"
          echo "$body"
          if [ "$status" -ge 400 ]; then
            exit 1
          fi
